name: Build 1Password CLI image

# Thin wrapper on top of the public ghcr.io/openclaw/openclaw image that adds
# the 1Password CLI (scripts/docker/op/Dockerfile). Runs on a schedule so
# hosts pulling ghcr.io/<owner>/openclaw:op never need to build locally.

on:
  schedule:
    - cron: "17 4 * * *"
  workflow_dispatch: {}
  push:
    branches:
      - vanilla
    paths:
      - "scripts/docker/op/Dockerfile"
      - ".github/workflows/build-op-image.yml"

concurrency:
  group: build-op-image
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build_and_push:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: scripts/docker/op/Dockerfile
          platforms: linux/amd64
          pull: true
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:op
