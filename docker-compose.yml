networks:
  openclaw-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

services:
  gluetun:
    image: qmcgaw/gluetun
    container_name: openclaw-vpn
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - VPN_SERVICE_PROVIDER=protonvpn
      - VPN_TYPE=wireguard
      - WIREGUARD_PRIVATE_KEY=${PROTONVPN_WIREGUARD_PRIVATE_KEY}
      - WIREGUARD_ADDRESSES=${PROTONVPN_WIREGUARD_ADDRESS}
      - SERVER_COUNTRIES=${VPN_SERVER_COUNTRY:-Netherlands}
      - FIREWALL_OUTBOUND_SUBNETS=172.20.0.0/16 # Allow openclaw network
    ports:
      - "127.0.0.1:${OPENCLAW_GATEWAY_PORT:-18789}:18789"
      - "${OPENCLAW_BRIDGE_PORT:-18790}:18790"
    extra_hosts:
      - "host.docker.internal:host-gateway" # Enable host.docker.internal on Linux
    networks:
      - openclaw-net
    restart: unless-stopped

  openclaw-gateway:
    network_mode: "service:gluetun"
    depends_on:
      - gluetun
    build:
      context: .
      dockerfile: Dockerfile
      args:
        OPENCLAW_INSTALL_DOCKER_CLI: "1"
    image: openclaw:local
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_DISABLE_BONJOUR: "1"
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}
      OPENCLAW_ALLOW_INSECURE_PRIVATE_WS: ${OPENCLAW_ALLOW_INSECURE_PRIVATE_WS:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY:-}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY:-}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE:-}
      TZ: ${OPENCLAW_TZ:-UTC}
      # VPS-specific
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_BOT_TOKEN_LIFE_COACH: ${TELEGRAM_BOT_TOKEN_LIFE_COACH:-}
      TELEGRAM_BOT_TOKEN_VISION: ${TELEGRAM_BOT_TOKEN_VISION:-}
      TELEGRAM_BOT_TOKEN_LINUX: ${TELEGRAM_BOT_TOKEN_LINUX}
      BRAVE_API_KEY: ${BRAVE_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OP_SERVICE_ACCOUNT_TOKEN: ${OP_SERVICE_ACCOUNT_TOKEN:-}
    volumes:
      - ${OPENCLAW_CONFIG_DIR}:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR}:/home/node/.openclaw/workspace
      ## Uncomment the lines below to enable sandbox isolation
      ## (agents.defaults.sandbox). Requires Docker CLI in the image
      ## (build with --build-arg OPENCLAW_INSTALL_DOCKER_CLI=1) or use
      ## scripts/docker/setup.sh with OPENCLAW_SANDBOX=1 for automated setup.
      ## Set DOCKER_GID to the host's docker group GID (run: stat -c '%g' /var/run/docker.sock).
      # VPS-specific tool persistence
      - ${OPENCLAW_CONFIG_DIR}/gh_config:/home/node/.config/gh
      - ${OPENCLAW_CONFIG_DIR}/op_config:/home/node/.config/op
      - ${OPENCLAW_CONFIG_DIR}/ssh:/home/node/.ssh:ro
      - /var/run/docker.sock:/var/run/docker.sock
    group_add:
      - "988" # Docker group ID - check yours with: getent group docker | cut -d: -f3
    init: true
    restart: unless-stopped
    command:
      [
        "node",
        "dist/index.js",
        "gateway",
        "--bind",
        "${OPENCLAW_GATEWAY_BIND:-lan}",
        "--port",
        "18789",
      ]
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:18789/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  openclaw-cli:
    image: ${OPENCLAW_IMAGE:-openclaw:local}
    network_mode: "service:openclaw-gateway"
    cap_drop:
      - NET_RAW
      - NET_ADMIN
    security_opt:
      - no-new-privileges:true
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}
      OPENCLAW_ALLOW_INSECURE_PRIVATE_WS: ${OPENCLAW_ALLOW_INSECURE_PRIVATE_WS:-}
      BROWSER: echo
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY:-}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY:-}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE:-}
      TZ: ${OPENCLAW_TZ:-UTC}
    volumes:
      - ${OPENCLAW_CONFIG_DIR}:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR}:/home/node/.openclaw/workspace
      - ${OPENCLAW_CONFIG_DIR}/gh_config:/home/node/.config/gh
      - ~/.ssh:/home/node/.ssh:ro
    stdin_open: true
    tty: true
    init: true
    entrypoint: ["node", "dist/index.js"]
    depends_on:
      - openclaw-gateway

  openclaw-browser:
    build:
      context: .
      dockerfile: Dockerfile.sandbox-browser
    networks:
      openclaw-net:
        ipv4_address: 172.20.0.10
    environment:
      OPENCLAW_BROWSER_HEADLESS: "0"
      OPENCLAW_BROWSER_CDP_PORT: "9222"
      OPENCLAW_BROWSER_VNC_PORT: "5900"
      OPENCLAW_BROWSER_NOVNC_PORT: "6080"
      OPENCLAW_BROWSER_ENABLE_NOVNC: "1"
      OPENCLAW_BROWSER_EXTRA_ARGS: "--remote-allow-origins=*"
      OPENCLAW_BROWSER_CDP_SOURCE_RANGE: "172.20.0.0/16"
      OPENCLAW_BROWSER_NOVNC_PASSWORD: ${BROWSER_NOVNC_PASSWORD}
    ports:
      - "9222:9222"
      - "6080:6080"
    init: true
    restart: unless-stopped
